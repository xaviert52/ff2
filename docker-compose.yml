services:
  postgres_db:
    image: postgres:15-alpine
    container_name: flows_postgres
    environment:
      POSTGRES_USER: flows_user
      POSTGRES_PASSWORD: flows_password
      POSTGRES_DB: flows_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flows_network

  flows:
    build: .
    container_name: flows-flows-1
    depends_on:
      - postgres_db
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_DRIVER=postgres
      - DB_DSN=host=postgres_db user=flows_user password=flows_password dbname=flows_db port=5432 sslmode=disable
      - DB_PATH= # Anulamos el default del código
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - flows_network

volumes:
  postgres_data:

networks:
  flows_network:
    driver: bridge